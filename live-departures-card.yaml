type: markdown
content: >
  {% set deps = state_attr('sensor.cfl_abfahrten_rohdaten', 'Departure') or []
  %} {% set start = states('input_select.cfl_start_stop').split('|')[0] | trim
  %} {% set ziel = states('input_select.cfl_destination_stop').split('|')[0] |
  trim %} {% set next_time = states('sensor.cfl_nachste_abfahrt') %} {% set
  delay = state_attr('sensor.cfl_nachste_abfahrt', 'verspaetung_minuten') |
  int(0) %} {% set line = state_attr('sensor.cfl_nachste_abfahrt', 'linie') %}
  {% set direction = state_attr('sensor.cfl_nachste_abfahrt', 'richtung') %} {%
  set track = state_attr('sensor.cfl_nachste_abfahrt', 'gleis') %}

  # 🚆 CFL Live-Abfahrten

  ## {{ start }} → {{ ziel }}

  {% if deps | count > 0 %}

  <ha-alert alert-type="{% if delay > 0 %}warning{% else %}success{% endif %}">
  Nächste Abfahrt: <b>{{ next_time }}</b> {% if delay > 0 %} · {{ delay }} min
  Verspätung {% else %} · pünktlich {% endif %} </ha-alert>

  **Linie:** {{ line if line else '–' }}   

  **Richtung:** {{ direction if direction else '–' }}

  **Gleis:** {{ track if track else '–' }}

  **Aktualisierungsrate:** {{ states('input_number.cfl_refresh_seconds') | int
  }} Sekunden

  **Letzte Daten:** {{
  as_timestamp(states.sensor.cfl_abfahrten_rohdaten.last_updated) |
  timestamp_custom('%H:%M:%S') }}

  ---

  ## Nächste Verbindungen:

  {% for d in deps[:6] %} {% set realtime = d.rtTime if d.rtTime is defined else
  d.time if d.time is defined else '?' %} {% set planned = d.time if d.time is
  defined else '' %} {% set dep_line = d.name if d.name is defined else 'Linie
  unbekannt' %} {% set dep_direction = d.direction if d.direction is defined
  else 'Richtung unbekannt' %} {% set dep_track = d.rtTrack if d.rtTrack is
  defined else d.track if d.track is defined else '' %}

  **{{ realtime }}** · **{{ dep_line }}**   → {{ dep_direction }} {%- if
  dep_track %} · Gleis {{ dep_track }} {%- endif %} {%- if planned and realtime
  != planned %} · Plan {{ planned }} {%- endif %}

  {% endfor %}

  {% else %}

  <ha-alert alert-type="info"> Keine Abfahrten gefunden. </ha-alert>

  **Route:** {{ start }} → {{ ziel }}   **Letzte Abfrage:** {{
  as_timestamp(states.sensor.cfl_abfahrten_rohdaten.last_updated) |
  timestamp_custom('%H:%M:%S') }}

  Prüfe, ob Start und Ziel korrekt gewählt sind.

  {% endif %}
